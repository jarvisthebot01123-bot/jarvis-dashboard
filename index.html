<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.R.V.I.S. Hub</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="style.css">
<style>
body{
  background:#f0f2f8;
  display:flex;flex-direction:column;
  min-height:100vh;
}
/* Desktop: no-scroll single viewport */
@media(min-width:769px){body{height:100vh;overflow:hidden}}

body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 120% 60% at 50% -10%,rgba(29,78,216,.08) 0%,transparent 70%);
}

.hub-body{
  flex:1;display:flex;flex-direction:column;
  padding:12px 20px 8px;gap:12px;
  min-height:0;position:relative;z-index:2
}

/* ── Compact JARVIS hero ── */
.hub-hero{text-align:center;flex-shrink:0;padding:4px 0 2px}
.hub-title{
  font-size:2rem;font-weight:900;letter-spacing:.22em;
  background:linear-gradient(135deg,#0f1a30 40%,#1d4ed8 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hub-sub{font-size:.58rem;color:#1d4ed8;letter-spacing:.32em;text-transform:uppercase;margin-top:1px;font-weight:700;opacity:.7}
.hub-pill{
  display:inline-flex;align-items:center;gap:6px;
  border-radius:20px;padding:3px 14px;font-size:.68rem;font-weight:700;
  letter-spacing:.1em;margin-top:7px;border:1.5px solid;text-transform:uppercase
}
.hub-pill-active{background:rgba(5,150,105,.07);border-color:rgba(5,150,105,.3);color:#059669}
.hub-pill-partial{background:rgba(245,158,11,.07);border-color:rgba(245,158,11,.3);color:#d97706}
.hub-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ── Comic-book card grid ── */
.hub-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;flex:1;min-height:0}
@media(max-width:900px){.hub-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.hub-grid{grid-template-columns:1fr;gap:12px}}

/* Card — full-height comic cover */
.hub-card{
  border-radius:14px;overflow:hidden;text-decoration:none;
  display:flex;flex-direction:column;
  position:relative;min-height:0;
  user-select:none;-webkit-tap-highlight-color:transparent;
  transition:transform .3s ease,box-shadow .35s ease;
}
.hub-card:hover{transform:translateY(-7px)}

/* Poster = full card */
.card-poster{flex:1;min-height:220px;position:relative;overflow:hidden}
.card-poster img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;object-position:top center;
  transition:transform .55s ease, filter .55s ease;display:block;
  filter:grayscale(100%) brightness(.85);
}
.hub-card:hover .card-poster img{transform:scale(1.07);filter:grayscale(0%) brightness(1.05) saturate(1.2)}

/* Overlay — visible at rest, fades away on hover */
.card-overlay{
  position:absolute;inset:0;z-index:2;
  background:linear-gradient(to top,rgba(0,0,0,.9) 0%,rgba(0,0,0,.6) 35%,rgba(0,0,0,.12) 65%,transparent 100%);
  display:flex;flex-direction:column;justify-content:space-between;
  padding:12px 14px 16px;
  transition:opacity .35s ease;
}
.hub-card:hover .card-overlay{opacity:0}

.card-overlay-badge{
  align-self:flex-start;
  font-size:.57rem;letter-spacing:.2em;text-transform:uppercase;font-weight:700;
  padding:3px 9px;border-radius:10px;
  background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.18);
  color:rgba(255,255,255,.85);backdrop-filter:blur(6px);
}
.card-overlay-body{display:flex;flex-direction:column;gap:3px}
.card-overlay-hero{
  font-size:1.5rem;font-weight:900;color:#fff;
  letter-spacing:.06em;text-transform:uppercase;line-height:1;
  text-shadow:0 2px 16px rgba(0,0,0,.6);
}
.card-overlay-name{font-size:.8rem;color:rgba(255,255,255,.7);font-weight:600}
.card-overlay-status{font-size:.7rem;font-weight:600;min-height:15px;margin-top:2px}

/* CTA button — hidden at rest, slides up on hover */
.card-cta{
  position:absolute;bottom:22px;left:50%;z-index:3;
  transform:translateX(-50%) translateY(14px);
  opacity:0;transition:all .3s ease;
  padding:10px 28px;border-radius:26px;
  font-weight:800;font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;
  color:#fff;backdrop-filter:blur(14px);white-space:nowrap;
  border:2px solid rgba(255,255,255,.55);background:rgba(0,0,0,.3);
}
.hub-card:hover .card-cta{opacity:1;transform:translateX(-50%) translateY(0)}

/* Per-card border + glow */
.card-trader{border:3px solid rgba(196,18,48,.3)}
.card-trader:hover{border-color:rgba(196,18,48,.75);box-shadow:0 20px 70px rgba(196,18,48,.35)}
.card-trader .card-poster{background:linear-gradient(160deg,#ff6b35,#c41230,#7b0012,#2a0007)}
.card-trader .card-cta{border-color:rgba(255,120,120,.7);background:rgba(196,18,48,.3)}

.card-youtuber{border:3px solid rgba(29,78,216,.3)}
.card-youtuber:hover{border-color:rgba(29,78,216,.75);box-shadow:0 20px 70px rgba(29,78,216,.35)}
.card-youtuber .card-poster{background:linear-gradient(160deg,#60a5fa,#1d4ed8,#1e3a8a,#0a1550)}
.card-youtuber .card-cta{border-color:rgba(100,160,255,.7);background:rgba(29,78,216,.3)}

.card-journalist{border:3px solid rgba(29,64,175,.3)}
.card-journalist:hover{border-color:rgba(29,64,175,.75);box-shadow:0 20px 70px rgba(29,64,175,.3)}
.card-journalist .card-poster{background:linear-gradient(160deg,#818cf8,#1e40af,#b91c1c,#78350f)}
.card-journalist .card-cta{border-color:rgba(180,200,255,.7);background:rgba(29,64,175,.3)}

footer{text-align:center;padding:5px;font-size:.67rem;color:#8090b0;flex-shrink:0;position:relative;z-index:2}

@media(max-width:480px){
  .hub-body{padding:10px 14px 6px;gap:10px}
  .hub-title{font-size:1.5rem}
  .card-poster{min-height:200px}
  .card-overlay-hero{font-size:1.2rem}
}
</style>
</head>
<body>

<header class="pnav-bar">
  <a href="index.html" class="pnav-logo">
    <svg width="36" height="36" viewBox="0 0 48 48"><polygon points="24,4 42,14 42,34 24,44 6,34 6,14" fill="rgba(15,26,48,.12)" stroke="#0f1a30" stroke-width="3" stroke-linejoin="round"/><circle cx="24" cy="24" r="7" fill="#0f1a30"/></svg>
    <span>J.A.R.V.I.S.</span>
  </a>
  <nav class="pnav-links">
    <a href="trader.html" class="pnav-item trader">📈 Trader</a>
    <a href="youtuber.html" class="pnav-item youtuber">🎬 YouTuber</a>
    <a href="journalist.html" class="pnav-item journalist">📰 Journalist</a>
  </nav>
  <div class="pnav-right"></div>
</header>

<div class="hub-body">

  <div class="hub-hero">
    <div class="hub-title">J.A.R.V.I.S.</div>
    <div class="hub-sub">Just A Rather Very Intelligent System</div>
    <div class="hub-pill hub-pill-partial" id="status-pill">
      <span class="hub-dot" id="status-dot" style="background:#d97706"></span>
      <span id="status-text">CHECKING…</span>
    </div>
  </div>

  <div class="hub-grid">

    <a href="trader.html" class="hub-card card-trader">
      <div class="card-poster">
        <img src="img/ironman.jpg" alt="Iron Man" loading="lazy">
        <div class="card-overlay">
          <div class="card-overlay-badge">📈 Trader</div>
          <div class="card-overlay-body">
            <div class="card-overlay-hero">Iron Man</div>
            <div class="card-overlay-name">Tony Stark</div>
            <div class="card-overlay-status" id="trader-stats">Loading…</div>
          </div>
        </div>
        <div class="card-cta">Open Trader →</div>
      </div>
    </a>

    <a href="youtuber.html" class="hub-card card-youtuber">
      <div class="card-poster">
        <img src="img/cap_portrait.jpg" alt="Captain America" loading="lazy">
        <div class="card-overlay">
          <div class="card-overlay-badge">🎬 YouTuber</div>
          <div class="card-overlay-body">
            <div class="card-overlay-hero">Captain America</div>
            <div class="card-overlay-name">Steve Rogers</div>
            <div class="card-overlay-status" id="youtuber-stats">Checking…</div>
          </div>
        </div>
        <div class="card-cta">Open YouTuber →</div>
      </div>
    </a>

    <a href="journalist.html" class="hub-card card-journalist">
      <div class="card-poster">
        <img src="img/superman_full.webp" alt="Superman" loading="lazy">
        <div class="card-overlay">
          <div class="card-overlay-badge">📰 Journalist</div>
          <div class="card-overlay-body">
            <div class="card-overlay-hero">Superman</div>
            <div class="card-overlay-name">Clark Kent</div>
            <div class="card-overlay-status" id="journalist-stats">Checking…</div>
          </div>
        </div>
        <div class="card-cta">Open Journalist →</div>
      </div>
    </a>

  </div>
</div>

<footer>J.A.R.V.I.S.</footer>

<script>
async function checkSystems() {
  const active = {trader:false, youtuber:false, journalist:false};

  try {
    const r = await fetch('dashboard-data.json?t='+Date.now());
    if (r.ok) {
      const d = await r.json();
      active.trader = true;
      const a = d.account||{};
      if (a.total_pct !== undefined && a.total_pct !== 0) {
        const sign = a.total_pct >= 0 ? '+' : '';
        const col  = a.total_pct >= 0 ? '#059669' : '#dc2626';
        document.getElementById('trader-stats').innerHTML =
          `<span style="color:#059669">● Active</span>&nbsp;<span style="color:${col}">${sign}${a.total_pct.toFixed(2)}%</span>`;
      } else {
        document.getElementById('trader-stats').innerHTML = '<span style="color:#059669">● Active</span>';
      }
    }
  } catch(e) {
    document.getElementById('trader-stats').innerHTML = '<span style="color:#d97706">● Not configured</span>';
  }

  try {
    const r = await fetch('youtuber-data.json?t='+Date.now());
    if (r.ok) {
      const d = await r.json();
      active.youtuber = d.connected === true;
      document.getElementById('youtuber-stats').innerHTML = active.youtuber
        ? '<span style="color:#059669">● Live</span>'
        : '<span style="color:#d97706">● Push youtuber-data.json to activate</span>';
    } else throw new Error();
  } catch(e) {
    document.getElementById('youtuber-stats').innerHTML = '<span style="color:#d97706">● Not configured</span>';
  }

  try {
    const r = await fetch('journalist-data.json?t='+Date.now());
    if (r.ok) {
      const d = await r.json();
      active.journalist = d.connected === true;
      document.getElementById('journalist-stats').innerHTML = active.journalist
        ? '<span style="color:#059669">● Live</span>'
        : '<span style="color:#d97706">● Push journalist-data.json to activate</span>';
    } else throw new Error();
  } catch(e) {
    document.getElementById('journalist-stats').innerHTML = '<span style="color:#d97706">● Not configured</span>';
  }

  const n = Object.values(active).filter(Boolean).length;
  const pill = document.getElementById('status-pill');
  const dot  = document.getElementById('status-dot');
  const txt  = document.getElementById('status-text');
  if (n === 3) {
    pill.className = 'hub-pill hub-pill-active';
    dot.style.cssText = 'width:6px;height:6px;border-radius:50%;background:#059669;box-shadow:0 0 8px #00e87a;flex-shrink:0';
    txt.textContent = 'ALL SYSTEMS ACTIVE';
  } else if (n === 0) {
    dot.style.background = '#d97706';
    txt.textContent = 'SETTING UP';
  } else {
    dot.style.background = '#d97706';
    txt.textContent = n + '/3 ACTIVE';
  }
}
checkSystems();
</script>
</body>
</html>
